name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs

      - name: Run preset palette contrast QA
        run: node scripts/color-qa-presets.mjs

      - name: Build demo PPTX
        run: node examples/build_miku_demo.mjs

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: miku-demo-node-${{ matrix.node-version }}
          path: examples/slides/output/miku-demo.pptx
          retention-days: 7
